version: 2

models:
  - name: mart_restaurants
    description: >
      One row per restaurant. Joins business attributes with aggregated review metrics
      and a cuisine classification derived from the categories string.
      Core mart consumed by the dashboard.
    columns:
      - name: business_id
        description: Yelp's unique identifier for the restaurant.
        tests:
          - unique
          - not_null

      - name: name
        description: Restaurant name.
        tests:
          - not_null

      - name: city
        description: City where the restaurant is located.

      - name: state
        description: US state abbreviation.

      - name: latitude
        description: Geographic latitude.

      - name: longitude
        description: Geographic longitude.

      - name: avg_stars
        description: Yelp's cumulative historical average rating for the business.

      - name: review_count
        description: Total review count as reported by Yelp (may differ from review_count_actual).

      - name: is_open
        description: Whether the restaurant is currently open or permanently closed.

      - name: price_range
        description: Yelp price range (1–4 as string). Null when not set by the business.

      - name: outdoor_seating
        description: Whether the venue offers outdoor seating. Source value is a string ('True'/'False').

      - name: has_delivery
        description: Whether the restaurant offers delivery.

      - name: has_takeout
        description: Whether the restaurant offers takeout.

      - name: takes_reservations
        description: Whether the restaurant accepts reservations.

      - name: wifi
        description: WiFi availability. Raw value may be 'free', 'paid', 'no', or null.

      - name: alcohol
        description: Alcohol service type. Values include 'full_bar', 'beer_and_wine', 'none', or null.

      - name: good_for_kids
        description: Whether the business is considered family-friendly.

      - name: has_tv
        description: Whether the venue has TVs.

      - name: cuisine_type
        description: >
          Dominant cuisine type derived from pattern matching on the categories field.
          Assigned 'Other' when no known cuisine keyword is found.
        tests:
          - not_null

      - name: review_count_actual
        description: >
          Count of reviews present in the dataset for this business.
          Null if the business has no reviews in the dataset.

      - name: avg_stars_reviews
        description: >
          Average star rating recalculated from raw review records.
          More accurate than avg_stars for businesses with recent rating changes.

      - name: last_review_date
        description: Date of the most recent review in the dataset.

      - name: total_review_votes
        description: Sum of all useful + funny + cool votes across all reviews for this business.

      - name: hidden_gem_score
        description: >
          Score designed to surface high-quality venues with low review volume.
          Formula: avg_stars_reviews / ln(review_count_actual + 2).
          Higher scores indicate places that are well-rated but not yet widely discovered.
          Null for businesses with no reviews in the dataset.

      - name: avg_sentiment
        description: >
          Mean VADER compound score across all reviews for this restaurant.
          Range [-1.0, 1.0]. Independent of star ratings — derived from review text only.

      - name: pct_positive
        description: Percentage of reviews where VADER compound score is above 0.05.

      - name: pct_negative
        description: Percentage of reviews where VADER compound score is below -0.05.

      - name: pct_neutral
        description: Percentage of reviews where VADER compound score is between -0.05 and 0.05.

      - name: scored_review_count
        description: Number of reviews that were scored by VADER for this restaurant.

  - name: mart_cuisine_summary
    description: >
      Aggregated metrics grouped by cuisine type.
      Excludes the 'Other' category to keep dashboard comparisons meaningful.
      Used for cuisine-level comparisons in the dashboard.
    columns:
      - name: cuisine_type
        description: Cuisine category as classified in mart_restaurants.
        tests:
          - unique
          - not_null

      - name: restaurant_count
        description: Total number of restaurants in this cuisine category.

      - name: avg_rating
        description: Average of avg_stars_reviews across all restaurants in the category.

      - name: avg_review_count
        description: Average number of reviews per restaurant in the category.

      - name: avg_hidden_gem_score
        description: Average hidden gem score across restaurants in the category.

      - name: open_count
        description: Number of restaurants in this category that are still open.

      - name: pct_open
        description: Percentage of restaurants in this category that are still open.
